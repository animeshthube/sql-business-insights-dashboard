<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Business Insights Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fafaf9; --surface:#ffffff; --hairline:#e2e8f0;
    --ink:#1f2937; --muted:#64748b;
    --teal:#0f766e; --coral:#c2410c; --indigo:#4338ca; --amber:#b45309;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--paper); color:var(--ink); font-family:var(--sans); padding:36px 40px; }
  .wrap{max-width:1220px; margin:0 auto;}

  header{ margin-bottom:24px; padding-bottom:20px; border-bottom:2px solid var(--ink); }
  .eyebrow{font-family:var(--mono); font-size:11.5px; letter-spacing:2px; color:var(--teal); margin-bottom:8px;}
  h1{font-size:30px; font-weight:700;}
  .subtitle{color:var(--muted); font-size:13.5px; margin-top:6px;}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:34px;}
  .kpi{background:var(--surface); border:1px solid var(--hairline); border-radius:8px; padding:16px 18px;}
  .kpi .label{font-family:var(--mono); font-size:10px; letter-spacing:1.3px; color:var(--muted); margin-bottom:8px; text-transform:uppercase;}
  .kpi .value{font-family:var(--mono); font-size:24px; font-weight:700;}

  .query-card{
    background:var(--surface); border:1px solid var(--hairline); border-radius:10px;
    margin-bottom:22px; overflow:hidden;
  }
  .query-card-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 20px; border-bottom:1px solid var(--hairline); cursor:pointer;
  }
  .query-card-head:hover{background:#f8fafc;}
  .qc-title{font-weight:600; font-size:14.5px;}
  .qc-num{font-family:var(--mono); color:var(--teal); margin-right:8px;}
  .qc-toggle{font-family:var(--mono); font-size:12px; color:var(--muted);}
  .query-card-body{ display:grid; grid-template-columns:1fr 1fr; gap:0; }
  .sql-pane{
    background:#1e293b; color:#e2e8f0; padding:18px 20px; font-family:var(--mono);
    font-size:12.3px; line-height:1.7; overflow-x:auto; white-space:pre;
  }
  .sql-kw{color:#7dd3fc;}
  .viz-pane{ padding:20px; display:flex; flex-direction:column; }
  .chart-holder{ position:relative; height:230px; flex:1; }
  table.mini{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.mini th{text-align:left; font-family:var(--mono); font-size:9.5px; letter-spacing:1px; color:var(--muted); padding:6px 4px; border-bottom:1.5px solid var(--ink);}
  table.mini td{padding:7px 4px; border-bottom:1px solid var(--hairline);}
  .badge{font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:10px;}
  .badge.top{background:rgba(15,118,110,0.12); color:var(--teal);}
  .badge.solid{background:rgba(180,83,9,0.12); color:var(--amber);}
  .badge.slow{background:rgba(194,65,12,0.12); color:var(--coral);}

  .concepts{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  .concept-tag{font-family:var(--mono); font-size:9.5px; color:var(--indigo); background:rgba(67,56,202,0.08); padding:2px 7px; border-radius:8px;}

  .collapsed .query-card-body{display:none;}

  footer{ margin-top:24px; padding-top:16px; border-top:1px solid var(--hairline); font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; line-height:1.8; }

  @media(max-width:900px){ .kpis{grid-template-columns:repeat(2,1fr);} .query-card-body{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">RETAIL SALES ANALYSIS &middot; FY2023&ndash;2025</div>
    <h1>SQL Business Insights Dashboard</h1>
    <div class="subtitle">Every insight below is generated by the SQL query shown beside it &mdash; click a card to expand.</div>
  </header>

  <div class="kpis" id="kpiRow"></div>

  <div id="cards"></div>

  <footer>
    Full query file: sql/queries.sql &middot; database: data/sales.db (SQLite)<br>
    Synthetic retail dataset generated for portfolio purposes
  </footer>
</div>

<script src="data.js"></script>
<script>
const D = SQL_DATA;
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#e2e8f0';
const TEAL='#0f766e', CORAL='#c2410c', INDIGO='#4338ca', AMBER='#b45309', SLATE='#64748b';
const PALETTE=[TEAL,INDIGO,AMBER,CORAL,SLATE,'#7c3aed'];

function fmt(v){ return '$'+Math.round(v).toLocaleString('en-US'); }

kpiRow.innerHTML = [
  ['TOTAL REVENUE', fmt(D.summary.total_revenue)],
  ['TOTAL ORDERS', D.summary.total_orders.toLocaleString()],
  ['AVG ORDER VALUE', fmt(D.summary.aov)],
  ['2025 YoY GROWTH', D.yoy[D.yoy.length-1].yoy_growth_pct + '%'],
].map(([l,v])=>`<div class="kpi"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('');

function sqlHighlight(code){
  return code
    .replace(/\n/g, '<br>')
    .replace(/(SELECT|FROM|JOIN|ON|GROUP BY|HAVING|ORDER BY|WHERE|CASE|WHEN|THEN|ELSE|END|WITH|OVER|PARTITION BY|LAG|RANK|LIMIT|DESC|ASC|AS|SUM|COUNT|AVG|ROUND|DISTINCT)(?=[\s(<])/g, '<span class="sql-kw">$1</span>');
}

function card(num, title, concepts, sql, bodyBuilderFn){
  const el = document.createElement('div');
  el.className = 'query-card';
  el.innerHTML = `
    <div class="query-card-head">
      <div>
        <div class="qc-title"><span class="qc-num">Q${num}</span>${title}</div>
        <div class="concepts">${concepts.map(c=>`<span class="concept-tag">${c}</span>`).join('')}</div>
      </div>
      <div class="qc-toggle">[ collapse / expand ]</div>
    </div>
    <div class="query-card-body">
      <div class="sql-pane">${sqlHighlight(sql)}</div>
      <div class="viz-pane"><div class="chart-holder"><canvas></canvas></div></div>
    </div>
  `;
  el.querySelector('.query-card-head').addEventListener('click', () => el.classList.toggle('collapsed'));
  document.getElementById('cards').appendChild(el);
  const canvas = el.querySelector('canvas');
  const vizPane = el.querySelector('.viz-pane');
  bodyBuilderFn(canvas, vizPane);
}

card(1, 'Monthly Revenue', ['JOIN','GROUP BY','Aggregate'],
`SELECT strftime('%Y-%m', o.order_date) AS month,
       SUM(oi.quantity * oi.unit_price
           * (1 - oi.discount)) AS revenue
FROM orders o
JOIN order_items oi
  ON oi.order_id = o.order_id
GROUP BY month
ORDER BY month;`,
(canvas) => new Chart(canvas, {
  type:'line',
  data:{ labels:D.monthly_revenue.map(r=>r.month), datasets:[{
    data:D.monthly_revenue.map(r=>r.revenue), borderColor:TEAL, backgroundColor:'rgba(15,118,110,0.08)',
    fill:true, tension:0.3, pointRadius:0, borderWidth:2 }]},
  options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}, ticks:{maxTicksLimit:8, font:{size:9}}}, y:{ticks:{callback:v=>'$'+(v/1000)+'k'}} } }
}));

card(3, 'Top 10 Customers by Revenue', ['JOIN x3','GROUP BY','HAVING'],
`SELECT c.customer_name, c.region,
       COUNT(DISTINCT o.order_id) AS orders,
       SUM(oi.quantity * oi.unit_price
           * (1 - oi.discount)) AS revenue
FROM customers c
JOIN orders o ON o.customer_id = c.customer_id
JOIN order_items oi ON oi.order_id = o.order_id
GROUP BY c.customer_id
HAVING COUNT(DISTINCT o.order_id) >= 2
ORDER BY revenue DESC LIMIT 10;`,
(canvas, pane) => {
  pane.querySelector('.chart-holder').remove();
  const tbl = document.createElement('table');
  tbl.className = 'mini';
  tbl.innerHTML = `<thead><tr><th>Customer</th><th>Region</th><th>Orders</th><th>Revenue</th></tr></thead>
    <tbody>${D.top_customers.map(c=>`<tr><td>${c.customer_name}</td><td>${c.region}</td><td>${c.order_count}</td><td>${fmt(c.total_revenue)}</td></tr>`).join('')}</tbody>`;
  pane.appendChild(tbl);
});

card(4, 'Product Performance Tiers', ['JOIN','GROUP BY','CASE'],
`SELECT p.product_name, p.category,
       SUM(oi.quantity) AS units_sold,
       SUM(oi.quantity * oi.unit_price
           * (1-oi.discount)) AS revenue,
       CASE
         WHEN revenue >= 15000 THEN 'Top Performer'
         WHEN revenue >= 6000  THEN 'Solid'
         ELSE 'Slow-Moving'
       END AS performance_tier
FROM products p
JOIN order_items oi ON oi.product_id = p.product_id
GROUP BY p.product_id
ORDER BY revenue DESC;`,
(canvas, pane) => {
  pane.querySelector('.chart-holder').remove();
  const top8 = D.product_performance.slice(0, 8);
  const tbl = document.createElement('table');
  tbl.className = 'mini';
  const badgeClass = t => t==='Top Performer'?'top':(t==='Solid'?'solid':'slow');
  tbl.innerHTML = `<thead><tr><th>Product</th><th>Units</th><th>Revenue</th><th>Tier</th></tr></thead>
    <tbody>${top8.map(p=>`<tr><td>${p.product_name}</td><td>${p.units_sold}</td><td>${fmt(p.revenue)}</td><td><span class="badge ${badgeClass(p.performance_tier)}">${p.performance_tier}</span></td></tr>`).join('')}</tbody>`;
  pane.appendChild(tbl);
});

card(6, 'Sales by Region', ['JOIN x3','GROUP BY','HAVING'],
`SELECT c.region,
       COUNT(DISTINCT o.order_id) AS orders,
       SUM(oi.quantity * oi.unit_price
           * (1-oi.discount)) AS revenue
FROM customers c
JOIN orders o ON o.customer_id = c.customer_id
JOIN order_items oi ON oi.order_id = o.order_id
GROUP BY c.region
HAVING revenue > 0
ORDER BY revenue DESC;`,
(canvas) => new Chart(canvas, {
  type:'bar',
  data:{ labels:D.sales_by_region.map(r=>r.region), datasets:[{ data:D.sales_by_region.map(r=>r.revenue), backgroundColor:PALETTE, borderRadius:3 }]},
  options:{ plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>'$'+(v/1000)+'k'}} } }
}));

card(7, 'Customer Purchase Frequency', ['CASE','Subquery','GROUP BY'],
`SELECT frequency_tier, COUNT(*) AS customers,
       AVG(total_revenue) AS avg_revenue
FROM (
  SELECT c.customer_id,
    CASE
      WHEN COUNT(DISTINCT o.order_id) = 1 THEN 'One-Time'
      WHEN COUNT(DISTINCT o.order_id)
           BETWEEN 2 AND 4 THEN 'Occasional'
      ELSE 'Frequent'
    END AS frequency_tier,
    SUM(oi.quantity*oi.unit_price*(1-oi.discount))
        AS total_revenue
  FROM customers c
  JOIN orders o ON o.customer_id = c.customer_id
  JOIN order_items oi ON oi.order_id = o.order_id
  GROUP BY c.customer_id
) t
GROUP BY frequency_tier;`,
(canvas) => new Chart(canvas, {
  type:'doughnut',
  data:{ labels:D.frequency.map(r=>r.frequency_tier+' ('+r.customer_count+')'), datasets:[{ data:D.frequency.map(r=>r.customer_count), backgroundColor:PALETTE, borderColor:'#fff', borderWidth:2 }]},
  options:{ cutout:'62%', plugins:{legend:{position:'bottom', labels:{boxWidth:10,font:{size:10}}}} }
}));

card(8, 'Year-over-Year Growth', ['Window Function','LAG()','CTE'],
`WITH yearly AS (
  SELECT strftime('%Y', o.order_date) AS year,
         SUM(oi.quantity*oi.unit_price*(1-oi.discount))
             AS revenue
  FROM orders o
  JOIN order_items oi ON oi.order_id = o.order_id
  GROUP BY year
)
SELECT year, revenue,
  LAG(revenue) OVER (ORDER BY year) AS prior_year,
  100.0 * (revenue - LAG(revenue) OVER (ORDER BY year))
        / LAG(revenue) OVER (ORDER BY year) AS yoy_pct
FROM yearly ORDER BY year;`,
(canvas) => new Chart(canvas, {
  type:'bar',
  data:{ labels:D.yoy.map(r=>r.year), datasets:[{ data:D.yoy.map(r=>r.revenue), backgroundColor:[SLATE,TEAL,TEAL], borderRadius:3 }]},
  options:{ plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>'$'+(v/1000)+'k'}} } }
}));

card(5, 'Slow-Moving Inventory', ['JOIN','GROUP BY','HAVING'],
`SELECT p.product_name, p.category,
       SUM(oi.quantity) AS units_sold,
       SUM(oi.quantity*oi.unit_price*(1-oi.discount))
           AS revenue
FROM products p
JOIN order_items oi ON oi.product_id = p.product_id
GROUP BY p.product_id
HAVING revenue < 6000
ORDER BY revenue ASC;`,
(canvas, pane) => {
  pane.querySelector('.chart-holder').remove();
  const tbl = document.createElement('table');
  tbl.className = 'mini';
  tbl.innerHTML = `<thead><tr><th>Product</th><th>Category</th><th>Units</th><th>Revenue</th></tr></thead>
    <tbody>${D.slow_moving.map(p=>`<tr><td>${p.product_name}</td><td>${p.category}</td><td>${p.units_sold}</td><td>${fmt(p.revenue)}</td></tr>`).join('')}</tbody>`;
  pane.appendChild(tbl);
});
</script>
</body>
</html>
